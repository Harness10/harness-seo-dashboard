});

const regs=[...new Set(P.map(p=>p.rg).filter(Boolean))].sort();
const sts=[...new Set(P.map(p=>p.state).filter(Boolean))].sort();
regs.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;document.getElementById('rF').appendChild(o)});
sts.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;document.getElementById('sF').appendChild(o)});

let flt='all',srch='',tab='cards',regV='',stV='',sortBy='health';

function gF(){
  let f=P;
  if(srch){const q=srch.toLowerCase();f=f.filter(p=>p.bn.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)||p.url.toLowerCase().includes(q)||(p.city||'').toLowerCase().includes(q)||(p.state||'').toLowerCase().includes(q)||(p.mkt||'').toLowerCase().includes(q))}
  if(regV)f=f.filter(p=>p.rg===regV);
  if(stV)f=f.filter(p=>p.state===stV);
  if(flt==='elite')f=f.filter(p=>p.ti==='Elite');
  else if(flt==='top5')f=f.filter(p=>p.t5>0);
  else if(flt==='vis')f=f.filter(p=>p.t10>0);
  else if(flt==='ghost')f=f.filter(p=>p.an);
  // Sort
  if(sortBy==='health')f=[...f].sort((a,b)=>b.hs-a.hs);
  else if(sortBy==='dr')f=[...f].sort((a,b)=>(b.se.dr||0)-(a.se.dr||0));
  else if(sortBy==='traffic')f=[...f].sort((a,b)=>(b.se.traffic||0)-(a.se.traffic||0));
  else if(sortBy==='rank')f=[...f].sort((a,b)=>b.t5-a.t5||b.t3-a.t3||(a.bp||999)-(b.bp||999));
  return f;
}

function ring(score,size=48){
  const r=size/2-4;const c=2*Math.PI*r;const off=c-(score/100)*c;const col=hsc(score);
  return`<div class="hs-ring" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--bd)" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>
    <div class="score" style="color:${col}">${score}</div></div>`;
}

function uSt(f){
  let s={p1:0,t3:0,t5:0,t10:0,t20:0,t21:0,nr:0,gh:0};
  f.forEach(p=>{if(p.an){s.gh++;return}p.kws.forEach(k=>{if(k.p==null)s.nr++;else if(k.p==1)s.p1++;else if(k.p<=3)s.t3++;else if(k.p<=5)s.t5++;else if(k.p<=10)s.t10++;else if(k.p<=20)s.t20++;else s.t21++})});
  document.getElementById('st').innerHTML=
    `<div class="pl"><span style="color:var(--gn)">#1</span><span class="n">${s.p1}</span></div>`+
    `<div class="pl"><span style="color:var(--gn2)">#2-3</span><span class="n">${s.t3}</span></div>`+
    `<div class="pl"><span style="color:var(--ac)">#4-5</span><span class="n">${s.t5}</span></div>`+
    `<div class="pl"><span style="color:var(--mt)">#6-10</span><span class="n">${s.t10}</span></div>`+
    `<div class="pl"><span style="color:var(--am)">#11-20</span><span class="n">${s.t20}</span></div>`+
    `<div class="pl"><span style="color:var(--rd)">#21+</span><span class="n">${s.t21}</span></div>`+
    `<div class="pl"><span style="color:#64748b">NR</span><span class="n">${s.nr}</span></div>`+
    `<div class="pl"><span style="color:var(--rd)">👻</span><span class="n">${s.gh}</span></div>`;
}

function cH(p){
  const dr=p.se.dr||0;let kr='';
  p.pins.forEach(k=>{kr+=`<tr class="pin"><td>📌 ${k.lb||k.k}</td><td>${fv(k.v)}</td><td><span class="po ${pc(k.p)}">${fp(k.p)}</span></td></tr>`});
  const top=p.kws.filter(k=>k.p!=null).slice(0,4);
  top.forEach(k=>{if(p.pins.some(pk=>pk.k===k.k))return;kr+=`<tr><td>${k.k}</td><td>${fv(k.v)}</td><td><span class="po ${pc(k.p)}">${fp(k.p)}</span></td></tr>`});
  if(p.an)kr=`<tr><td colspan="3"><div class="gm">👻 No rankings detected</div></td></tr>`;
  return`<div class="c" onclick="sD(${P.indexOf(p)})"><div class="c-top"><div style="flex:1">
    <div class="c-nm">${p.bn}</div><div class="c-loc">${p.city}, ${p.state} · <span class="rg">${p.rg}</span></div>
    <div class="c-url">${p.url}</div></div>
    <div style="text-align:center">${ring(p.hs,44)}<div style="font-size:.5rem;color:var(--mt);text-align:center">HEALTH</div></div></div>
    <div class="mr">
      <div class="mm"><div class="v" style="color:${dc(dr)}">${dr}</div><div class="l">DR</div></div>
      <div class="mm"><div class="v">${fv(p.se.traffic)}</div><div class="l">Traffic</div></div>
      <div class="mm"><div class="v">${p.se.refdomains||0}</div><div class="l">Ref Doms</div></div>
      <div class="mm"><div class="v" style="color:${p.au.hs!=null?(p.au.hs>=90?'var(--gn)':p.au.hs>=70?'var(--am)':'var(--rd)'):'var(--mt)'}">${p.au.hs!=null?p.au.hs+'%':'—'}</div><div class="l">Site Audit</div></div>
    </div>
    <table class="kt">${kr}</table></div>`;
}

function rC(f){
  return`<div class="sort-bar"><label>Sort by:</label>
    <button class="sort-btn ${sortBy==='health'?'on':''}" onclick="sortBy='health';R()">Health Score</button>
    <button class="sort-btn ${sortBy==='rank'?'on':''}" onclick="sortBy='rank';R()">Rankings</button>
    <button class="sort-btn ${sortBy==='traffic'?'on':''}" onclick="sortBy='traffic';R()">Traffic</button>
    <button class="sort-btn ${sortBy==='dr'?'on':''}" onclick="sortBy='dr';R()">DR</button>
  </div><div class="gd">${f.map(cH).join('')}</div>`;
}

function rL(f){
  const s=[...f].sort((a,b)=>b.hs-a.hs);
  return`<table class="lt"><thead><tr><th>#</th><th>Brand</th><th>Market</th><th>Region</th><th>Health</th><th>Site Audit</th><th>DR</th><th>Tier</th><th>Traffic</th><th>#1</th><th>Top3</th><th>Top5</th><th>Best</th><th>Value</th></tr></thead><tbody>`+s.map((p,i)=>`<tr class="${i<10?'gl':''}" style="cursor:pointer" onclick="sD(${P.indexOf(p)})">
    <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:${i<10?'var(--am)':'var(--mt)'}">${i+1}</td>
    <td style="font-weight:600">${p.bn}</td>
    <td style="color:var(--mt);font-size:.68rem">${p.city}, ${p.state}</td>
    <td><span class="rgt">${p.rg}</span></td>
    <td><span class="hd-score" style="color:${hsc(p.hs)}">${p.hs}</span><span class="hs-bar"><span class="hs-fill" style="width:${p.hs}%;background:${hsc(p.hs)}"></span></span></td>
    <td style="font-family:'JetBrains Mono',monospace;color:${p.au.hs!=null?(p.au.hs>=90?'var(--gn)':p.au.hs>=70?'var(--am)':'var(--rd)'):'var(--mt)'}">${p.au.hs!=null?p.au.hs+'%':'—'}</td>
    <td><span style="color:${dc(p.se.dr||0)};font-family:'JetBrains Mono',monospace;font-weight:600">${p.se.dr||0}</span></td>
    <td><span class="ti ${p.tc}">${p.ti}</span></td>
    <td style="font-family:'JetBrains Mono',monospace">${fv(p.se.traffic)}</td>
    <td style="font-family:'JetBrains Mono',monospace;color:var(--gn);font-weight:700">${p.p1}</td>
    <td style="font-family:'JetBrains Mono',monospace">${p.t3}</td>
    <td style="font-family:'JetBrains Mono',monospace">${p.t5}</td>
    <td>${p.bp?`<span class="po ${pc(p.bp)}">${p.bp}</span>`:'—'}</td>
    <td style="font-family:'JetBrains Mono',monospace;color:var(--gn);font-size:.68rem">${fm(p.se.org_cost)}</td></tr>`).join('')+`</tbody></table>`;
}

function rQ(f){
  const w=[];f.forEach(p=>{p.kws.forEach(k=>{if(k.p!=null&&k.p>=6&&k.p<=10){
    let pr,prc;if(k.p===6){pr='High';prc='color:var(--rd)'}else if(k.p<=8){pr='Med';prc='color:var(--am)'}else{pr='Low';prc='color:var(--mt)'}
    w.push({bn:p.bn,city:p.city,st:p.state,rg:p.rg,kw:k.k,vol:k.v,pos:k.p,gap:k.p-5,pr,prc})}})});
  w.sort((a,b)=>(b.vol||0)-(a.vol||0));
  if(!w.length)return'<div class="gm">No quick wins</div>';
  return`<table class="lt"><thead><tr><th>Brand</th><th>Market</th><th>Region</th><th>Keyword</th><th>Volume</th><th>Pos</th><th>Gap</th><th>Priority</th></tr></thead><tbody>`+w.slice(0,100).map(w=>`<tr>
    <td style="font-weight:600">${w.bn}</td><td style="color:var(--mt);font-size:.68rem">${w.city}, ${w.st}</td>
    <td><span class="rgt">${w.rg}</span></td><td>${w.kw}</td><td style="font-family:'JetBrains Mono',monospace">${fv(w.vol)}</td>
    <td><span class="po ${pc(w.pos)}">${w.pos}</span></td><td style="font-family:'JetBrains Mono',monospace;color:var(--am)">+${w.gap}</td>
    <td style="${w.prc};font-weight:600;font-size:.68rem">${w.pr}</td></tr>`).join('')+`</tbody></table>`;
}

function rG(f){
  const gh=f.filter(p=>p.an).sort((a,b)=>b.hs-a.hs);const sg=f.filter(p=>!p.an&&p.t10===0).sort((a,b)=>b.hs-a.hs);
  let h=`<h3 style="margin:12px 0 8px;color:var(--rd)">👻 Ghost Brands — No Rankings (${gh.length})</h3>`;
  if(!gh.length)h+='<div class="gm">None</div>';
  else h+=`<div class="gd">${gh.map(p=>`<div class="c" onclick="sD(${P.indexOf(p)})"><div class="c-top"><div style="flex:1">
    <div class="c-nm">${p.bn}</div><div class="c-loc">${p.city}, ${p.state} · <span class="rg">${p.rg}</span></div></div>
    ${ring(p.hs,40)}</div>
    <div class="mr"><div class="mm"><div class="v" style="color:${dc(p.se.dr||0)}">${p.se.dr||0}</div><div class="l">DR</div></div>
    <div class="mm"><div class="v">${p.au.hs!=null?p.au.hs+'%':'—'}</div><div class="l">Audit</div></div>
    <div class="mm"><div class="v">${p.se.refdomains||0}</div><div class="l">Ref Doms</div></div>
    <div class="mm"><div class="v">${fv(p.se.traffic)}</div><div class="l">Traffic</div></div></div>
    <div style="color:var(--mt);font-size:.7rem;margin-top:6px">Needs: content + local links for <strong>${p.city}</strong></div></div>`).join('')}</div>`;
  h+=`<h3 style="margin:18px 0 8px;color:var(--pk)">📉 Struggling — No Top 10 (${sg.length})</h3>`;
  if(!sg.length)h+='<div class="gm">None</div>';
  else h+=`<div class="gd">${sg.map(p=>`<div class="c" onclick="sD(${P.indexOf(p)})"><div class="c-top"><div>
    <div class="c-nm">${p.bn}</div><div class="c-loc">${p.city}, ${p.state} · <span class="rg">${p.rg}</span></div></div>
    ${ring(p.hs,40)}</div>
    <div style="font-size:.7rem;color:var(--mt)">Best: <span class="po ${pc(p.bp)}">${fp(p.bp)}</span> · DR: ${p.se.dr||0} · Audit: ${p.au.hs!=null?p.au.hs+'%':'—'}</div></div>`).join('')}</div>`;
  return h;
}

// Detail
window.sD=function(i){
  const p=P[i];const d=document.getElementById('dt');const dr=p.se.dr||0;
  let kr='';
  p.pins.forEach(k=>{kr+=`<tr class="pin"><td>📌 ${k.lb||k.k}</td><td style="font-family:'JetBrains Mono',monospace">${fv(k.v)}</td><td><span class="po ${pc(k.p)}">${fp(k.p)}</span></td></tr>`});
  p.kws.filter(k=>k.p!=null).forEach(k=>{if(p.pins.some(pk=>pk.k===k.k))return;kr+=`<tr><td>${k.k}</td><td style="font-family:'JetBrains Mono',monospace">${fv(k.v)}</td><td><span class="po ${pc(k.p)}">${fp(k.p)}</span></td></tr>`});
  p.kws.filter(k=>k.p==null).forEach(k=>{if(p.pins.some(pk=>pk.k===k.k))return;kr+=`<tr style="opacity:.4"><td>${k.k}</td><td style="font-family:'JetBrains Mono',monospace">${fv(k.v)}</td><td><span class="po pnr">NR</span></td></tr>`});
  d.innerHTML=`<button class="xb" onclick="xD()">✕ Close</button>
    <h2>${p.bn}</h2>
    <div class="su">${p.city}, ${p.state} · <span class="rgt">${p.rg}</span> · <a href="https://${p.url}" target="_blank">${p.url}</a> · <span class="bg ${p.bc}">${p.bd}</span></div>
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px;padding:12px;background:var(--cd);border-radius:10px;border:1px solid var(--bd)">
      ${ring(p.hs,64)}
      <div style="flex:1">
        <div style="font-weight:700;font-size:.9rem">Brand Health Score: <span style="color:${hsc(p.hs)}">${p.hs}/100</span></div>
        <div style="font-size:.68rem;color:var(--mt);margin-top:4px">
          Site Health: <span style="color:${hsc(p.siteH)}">${p.siteH}</span> (30%) ·
          Rank Power: <span style="color:${hsc(p.rkPow)}">${p.rkPow}</span> (40%) ·
          Authority: <span style="color:${hsc(p.authScore)}">${p.authScore}</span> (30%)
        </div>
      </div>
    </div>
    <div class="sg">
      <div class="sc"><div class="sv" style="color:${dc(dr)}">${dr}</div><div class="sl">Domain Rating</div></div>
      <div class="sc"><div class="sv">${(p.se.traffic||0).toLocaleString()}</div><div class="sl">Organic Traffic</div></div>
      <div class="sc"><div class="sv">${(p.se.refdomains||0).toLocaleString()}</div><div class="sl">Ref Domains</div></div>
      <div class="sc"><div class="sv" style="color:var(--gn)">${fm(p.se.org_cost)}</div><div class="sl">Traffic Value</div></div>
    </div>
    <div class="sg">
      <div class="sc"><div class="sv">${(p.se.kw_total||0).toLocaleString()}</div><div class="sl">Organic KWs</div></div>
      <div class="sc"><div class="sv" style="color:var(--gn)">${p.se.kw_1_3||0}</div><div class="sl">Top 3</div></div>
      <div class="sc"><div class="sv" style="color:${p.au.hs!=null?(p.au.hs>=90?'var(--gn)':p.au.hs>=70?'var(--am)':'var(--rd)'):'var(--mt)'}">${p.au.hs!=null?p.au.hs+'%':'—'}</div><div class="sl">Site Audit</div></div>
      <div class="sc"><div class="sv">${(p.se.backlinks||0).toLocaleString()}</div><div class="sl">Backlinks</div></div>
    </div>
    ${p.au.hs!=null?`<div style="padding:10px;background:var(--cd);border-radius:8px;border:1px solid var(--bd);margin-bottom:14px;font-size:.72rem">
      <strong>Site Audit Details:</strong> ${p.au.err||0} errors · ${p.au.warn||0} warnings · ${p.au.total||0} pages crawled
    </div>`:''}
    <h3 style="margin:14px 0 6px;font-size:.9rem">Tracked Keyword Rankings <span style="font-weight:400;color:var(--mt);font-size:.68rem">· Mobile · Sorted by position</span></h3>
    <table class="fk"><thead><tr><th>Keyword</th><th>Volume</th><th>Position</th></tr></thead><tbody>${kr}</tbody></table>`;
  document.getElementById('ov').classList.add('sh');document.body.style.overflow='hidden';
};
window.xD=function(){document.getElementById('ov').classList.remove('sh');document.body.style.overflow=''};
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)xD()});

function R(){
  const f=gF();uSt(f);
  document.getElementById('cn').textContent=f.length+' of '+P.length+' brands';
  const m=document.getElementById('mn');
  if(tab==='cards')m.innerHTML=rC(f);
  else if(tab==='lb')m.innerHTML=rL(f);
  else if(tab==='qw')m.innerHTML=rQ(f);
  else if(tab==='gaps')m.innerHTML=rG(f);
}

document.getElementById('q').addEventListener('input',e=>{srch=e.target.value;R()});
document.getElementById('rF').addEventListener('change',e=>{regV=e.target.value;R()});
document.getElementById('sF').addEventListener('change',e=>{stV=e.target.value;R()});
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');flt=b.dataset.f;R()}));
document.querySelectorAll('.t').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.t').forEach(x=>x.classList.remove('on'));t.classList.add('on');tab=t.dataset.t;R()}));
R();
</script></body></html>
